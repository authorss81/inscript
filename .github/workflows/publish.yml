# .github/workflows/publish.yml
# Automatically publishes inscript-lang to PyPI when you push a version tag.
#
# SETUP (one-time):
#   1. Go to https://pypi.org/manage/account/token/
#      → Add API token → Name: inscript-github → Scope: Project: inscript-lang
#      → Copy the token (starts with pypi-)
#   2. Go to https://github.com/authorss81/inscript/settings/secrets/actions
#      → New repository secret → Name: PYPI_API_TOKEN → paste token → Save
#
# To publish:
#   git tag -a v1.4.0 -m "InScript v1.4.0"
#   git push origin v1.4.0
#   → GitHub Actions: runs all tests → builds → uploads to PyPI

name: Publish to PyPI

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  test:
    name: Run tests before publish
    runs-on: ubuntu-latest
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: 1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install optional deps
        run: pip install pygame pygls
        continue-on-error: true

      - name: Run full test suite
        working-directory: inscript_package
        run: |
          python test_phase6.py
          python test_phase7.py
          python test_audit.py
          python test_comprehensive.py
          python test_v120.py
          python test_v130.py
          python test_v140.py
          python test_v150.py
          python test_v160.py

  build:
    name: Build distribution
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build

      - name: Build wheel and sdist
        working-directory: inscript_package
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: inscript_package/dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}

