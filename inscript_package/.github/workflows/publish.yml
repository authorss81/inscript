# .github/workflows/publish.yml
# Automatically publishes inscript-lang to PyPI when you push a version tag.
#
# Uses PyPI Trusted Publishers (OIDC) — NO API token or secret needed.
#
# ONE-TIME SETUP on PyPI:
#   1. Go to https://pypi.org/manage/project/inscript-lang/settings/publishing/
#   2. Click "Add a new publisher"
#   3. Fill in exactly:
#        Owner:         authorss81
#        Repository:    inscript
#        Workflow name: publish.yml
#        Environment:   pypi
#   4. Save — done. No token, no GitHub secret needed.
#
# To publish:
#   git tag -a v1.2.0 -m "InScript v1.2.0"
#   git push origin v1.2.0
#   → GitHub Actions runs all tests, then uploads to PyPI automatically

name: Publish to PyPI

on:
  push:
    tags:
      - 'v*.*.*'   # triggers on any version tag: v1.2.0, v1.3.0, etc.

jobs:
  test:
    name: Run tests before publish
    runs-on: ubuntu-latest
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: 1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install optional deps
        run: pip install pygame pygls
        continue-on-error: true

      - name: Run full test suite
        working-directory: inscript_package
        run: |
          python test_phase6.py
          python test_phase7.py
          python test_audit.py
          python test_comprehensive.py
          python test_v120.py

  build:
    name: Build distribution
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build

      - name: Build wheel and sdist
        working-directory: inscript_package
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: inscript_package/dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/inscript-lang/

    permissions:
      id-token: write   # REQUIRED for OIDC Trusted Publishing

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
