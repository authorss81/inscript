name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests — Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install pytest pytest-cov

      - name: Run all test suites
        run: |
          python -m pytest test_lexer.py      -v --tb=short -q
          python -m pytest test_parser.py     -v --tb=short -q
          python -m pytest test_analyzer.py   -v --tb=short -q
          python -m pytest test_interpreter.py -v --tb=short -q
          python -m pytest test_stdlib.py     -v --tb=short -q
          python -m pytest test_shader.py     -v --tb=short -q
          python -m pytest test_network.py    -v --tb=short -q
        working-directory: .

      - name: Test bytecode compiler
        run: |
          python -c "
          import sys; sys.path.insert(0,'.')
          from compiler.bytecode import run_source
          out = []
          run_source('fn fib(n){if n<=1{return n}\nreturn fib(n-1)+fib(n-2)}\nprint(fib(10))',
                     print_fn=lambda *a: out.append(str(a[0])))
          assert out[0]=='55', f'Expected 55, got {out[0]}'
          print('Bytecode VM: OK')
          "

      - name: Test AI system
        run: |
          python -c "
          import sys; sys.path.insert(0,'.')
          from ai.ai import make_world, make_navmesh, make_flock, AIAgent
          from ai.ai import Vec2, FSM, State, BehaviorTree, BTAction, BTSelector
          w = make_world()
          nav = make_navmesh(20,15,32)
          w.set_navmesh(nav)
          a = AIAgent(Vec2(100,100), 120)
          w.add(a)
          for _ in range(10): w.update(1/60)
          print('AI system: OK')
          "

      - name: Test UI system
        run: |
          python -c "
          import sys; sys.path.insert(0,'.')
          from ui.ui import UIManager, UIScreen, VStack, Button, Text, UITheme
          mgr = UIManager(800, 600)
          class TestScreen(UIScreen):
              def build(self):
                  return VStack(Text('Hello'), Button('OK'))
          mgr.push(TestScreen())
          mgr.update(1/60)
          html = mgr.render_html()
          assert 'Hello' in html
          print('UI system: OK')
          "

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyflakes
      - run: python -m pyflakes lexer.py parser.py analyzer.py interpreter.py ast_nodes.py || true

  web-build:
    name: Web Export Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build web export
        run: |
          python -c "
          import sys; sys.path.insert(0,'.')
          from targets.web.web_export import WebExporter, WebBuildConfig
          cfg = WebBuildConfig(game_title='Space Shooter', pwa_enabled=True)
          files = WebExporter().build('examples/space_shooter.ins', 'dist/', cfg)
          print(f'Built {len(files)} files')
          "
      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-export
          path: dist/
          retention-days: 30
