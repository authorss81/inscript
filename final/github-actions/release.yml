name: Release

on:
  push:
    tags:
      - "v*.*.*"           # triggers on v0.5.0, v1.0.0, etc.

permissions:
  contents: write          # for creating GitHub Release
  id-token: write          # for PyPI trusted publishing

jobs:
  # ── Build distributions ───────────────────────────────────────────────────
  build:
    name: Build packages
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build wheel + sdist
        run: |
          pip install wheel --quiet
          python setup.py sdist bdist_wheel --quiet
          ls -lh dist/

      - name: Build web export
        run: |
          python -c "
          import sys; sys.path.insert(0,'.')
          from targets.web.web_export import WebExporter, WebBuildConfig
          cfg = WebBuildConfig(game_title='Space Shooter Demo', pwa_enabled=True)
          WebExporter().build('examples/space_shooter.ins', 'web-dist/', cfg)
          "
          cd web-dist && zip -r ../space-shooter-web-${{ steps.version.outputs.version }}.zip .

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: |
            dist/
            space-shooter-web-*.zip

  # ── Publish to PyPI ────────────────────────────────────────────────────────
  publish-pypi:
    name: Publish → PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/inscript-lang
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-packages
          path: dist/

      - name: Publish to PyPI (trusted publishing — no token needed)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  # ── Publish to npm ─────────────────────────────────────────────────────────
  publish-npm:
    name: Publish → npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Sync version
        run: |
          cd deploy/npm-inscript
          npm version ${{ needs.build.outputs.version }} --no-git-tag-version

      - name: Publish to npm
        run: cd deploy/npm-inscript && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Build & push Docker image ──────────────────────────────────────────────
  publish-docker:
    name: Publish → Docker Hub
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            inscriptlang/inscript:latest
            inscriptlang/inscript:${{ needs.build.outputs.version }}

  # ── GitHub Release ─────────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    needs: [build, publish-pypi, publish-npm, publish-docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist-packages
          path: release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/**
          body: |
            ## InScript ${{ needs.build.outputs.version }}

            ### Install
            ```bash
            pip install inscript-lang==${{ needs.build.outputs.version }}
            # or
            npm install -g inscript-lang@${{ needs.build.outputs.version }}
            # or
            docker pull inscriptlang/inscript:${{ needs.build.outputs.version }}
            ```

            ### Play the Demo
            Download `space-shooter-web-*.zip`, unzip, open `index.html`.
