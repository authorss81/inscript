# .github/workflows/web-deploy.yml
# Automatically deploys your InScript game to GitHub Pages on every push to main.
# No configuration needed — just push and your game is live!
name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install inscript-lang
      - run: inscript build --target web game.ins --out dist/
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with: {path: dist/}
      - uses: actions/deploy-pages@v4
