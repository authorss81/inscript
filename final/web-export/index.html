<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Space Shooter</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#1a1a2e;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      min-height:100vh; font-family:monospace;
      overflow:hidden; user-select:none;
    }
    #canvas-wrap {
      position:relative;
      box-shadow:0 0 40px rgba(0,0,0,0.8);
    }
    #canvas {
      display:block;
      image-rendering:pixelated;
      cursor:crosshair;
    }
    #loading {
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      background:rgba(0,0,0,0.9); color:#fff; font-size:18px;
      flex-direction:column; gap:16px; z-index:10;
    }
    #loading .spinner {
      width:40px; height:40px;
      border:3px solid #333; border-top-color:#4af;
      border-radius:50%; animation:spin 0.8s linear infinite;
    }
    @keyframes spin { to {transform:rotate(360deg)} }
    #hud {
      position:absolute; top:8px; left:8px;
      color:rgba(255,255,255,0.6); font-size:11px; pointer-events:none;
    }
    #error-overlay {
      display:none; position:absolute; inset:0;
      background:rgba(0,0,0,0.95); color:#f55; padding:24px;
      font-size:13px; z-index:20; overflow:auto; white-space:pre;
    }
    #fs-btn {
      margin-top:8px; padding:6px 16px;
      background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2);
      color:#fff; cursor:pointer; border-radius:4px; font-size:12px;
    }
    #fs-btn:hover { background:rgba(255,255,255,0.2); }
  </style>
</head>
<body>
  <div id="canvas-wrap">
    <canvas id="canvas" width="800" height="600" tabindex="0"></canvas>
    <div id="loading">
      <div class="spinner"></div>
      <span>Loading Space Shooter...</span>
    </div>
    <div id="hud"></div>
    <div id="error-overlay"></div>
  </div>
  <button id="fs-btn" onclick="document.getElementById('canvas').requestFullscreen?.()">⛶ Fullscreen</button>

  <script src="game.js"></script>
  <script>
  (async () => {
    const loading = document.getElementById('loading');
    const hud     = document.getElementById('hud');
    const errDiv  = document.getElementById('error-overlay');
    try {
      const app = new InScriptApp('canvas', {
        useWebGL2: true,
        targetFps: 60
      });
      window._inscriptApp = app;

      await app.loadBytecode('game.insb');

      loading.style.display = 'none';
      document.getElementById('canvas').focus();

      // HUD: FPS counter
      setInterval(() => {
        hud.textContent = `FPS: ${app.engine.fps()} | Draws: ${app.engine.drawCalls()}`;
      }, 500);

      app.start();

      // PWA service worker
      if('serviceWorker' in navigator && true) {
        navigator.serviceWorker.register('sw.js').catch(()=>{});
      }
    } catch(e) {
      loading.style.display = 'none';
      errDiv.style.display  = 'block';
      errDiv.textContent    = '⚠ InScript Runtime Error\n\n' + e.stack;
      console.error(e);
    }
  })();
  </script>
  
</body>
</html>
